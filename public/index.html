<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Connect</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    button {
      background: #25D366;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #1ebe5d;
      transform: scale(1.05);
    }

    #qr {
      margin-top: 25px;
      width: 250px;
      height: 250px;
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: none;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>Connect WhatsApp</h2>

    ```
    <button onclick="connect()">Connect</button>

    <img id="qr" />

    <div class="status" id="status">Click connect to generate QR</div>
    ```

  </div>

  <script>
    const BASE_URL = "https://whatsapp-automation-nqjy.onrender.com";
    const USER_ID = "user1";

    let isPolling = false;
    let retryCount = 0;
    const MAX_RETRIES = 20;

    async function connect() {
      const status = document.getElementById('status');
      const btn = document.querySelector('button');

      // 🔥 reset everything
      retryCount = 0;
      isPolling = false;

      status.innerText = "Starting WhatsApp... (wait ~30 sec)";
      btn.disabled = true;

      try {
        const res = await fetch(`${BASE_URL}/api/whatsapp/connect`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: USER_ID })
        });

        if (!res.ok) {
          throw new Error("Backend failed");
        }

        // ⏳ WAIT before polling (CRITICAL)
        setTimeout(() => {
          if (!isPolling) {
            isPolling = true;
            pollQR();
          }
        }, 8000);

      } catch (err) {
        status.innerText = "❌ Backend not responding";
        btn.disabled = false;
        console.error(err);
      }
    }

    async function pollQR() {
      const img = document.getElementById('qr');
      const status = document.getElementById('status');
      const btn = document.querySelector('button');

      try {
        const res = await fetch(`${BASE_URL}/api/whatsapp/qr/${USER_ID}`);

        if (!res.ok) throw new Error("Server error");

        const data = await res.json();

        console.log("QR Response:", data);

        if (data.status === "qr") {
          img.src = data.qr;
          img.style.display = "block";
          status.innerText = "📲 Scan QR with WhatsApp";

          isPolling = false;
          btn.disabled = false;
          retryCount = 0;
          return;
        }

        if (data.status === "connected") {
          status.innerText = "✅ WhatsApp Connected!";
          img.style.display = "none";

          isPolling = false;
          btn.disabled = false;
          retryCount = 0;
          return;
        }

        status.innerText = "⏳ Initializing WhatsApp...";

      } catch (err) {
        console.error(err);
        status.innerText = "⚠️ Network / Server issue...";
      }

      retryCount++;

      if (retryCount > MAX_RETRIES) {
        status.innerText = "❌ Timeout. Try again.";
        isPolling = false;
        btn.disabled = false;
        retryCount = 0;
        return;
      }

      setTimeout(pollQR, 5000);
    }
  </script>
</body>

</html>
