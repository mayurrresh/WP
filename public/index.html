<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bot Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.6s ease;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #25D366;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #qr {
      margin-top: 20px;
      width: 220px;
      display: none;
      background: white;
      padding: 10px;
      border-radius: 10px;
      animation: pop 0.4s ease;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0;}
      to { transform: scale(1); opacity: 1;}
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>🔗 Connect WhatsApp</h2>
    <p>Link your WhatsApp to start automation</p>

    <input id="userId" placeholder="Client ID (hotel1)" />

    <button onclick="connect()">Connect</button>

    <img id="qr" />

    <div class="status" id="status">Idle</div>
  </div>

  <script>
    const BASE_URL = "http://localhost:3000";

    async function connect() {
      const userId = document.getElementById('userId').value;
      const status = document.getElementById('status');
      const btn = document.querySelector('button');

      if (!userId) {
        status.innerText = "❌ Enter Client ID";
        return;
      }

      btn.disabled = true;
      status.innerText = "🚀 Starting...";

      try {
        await fetch(`${BASE_URL}/api/whatsapp/connect`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId })
        });

        setTimeout(() => pollQR(userId), 2000);

      } catch {
        status.innerText = "❌ Backend error";
        btn.disabled = false;
      }
    }

    async function pollQR(userId) {
      const img = document.getElementById('qr');
      const status = document.getElementById('status');

      try {
        const res = await fetch(`${BASE_URL}/api/whatsapp/qr/${userId}`);
        const data = await res.json();

        if (data.status === "qr") {
          img.src = data.qr;
          img.style.display = "block";
          status.innerText = "📲 Scan QR in WhatsApp";
          return;
        }

        if (data.status === "connected") {
          status.innerText = "✅ Connected successfully";
          img.style.display = "none";
          return;
        }

        status.innerText = "⏳ Initializing...";

      } catch {
        status.innerText = "⚠️ Retrying...";
      }

      setTimeout(() => pollQR(userId), 2000);
    }
  </script>

</body>
</html>
