<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WhatsApp Bot Setup</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin-bottom: 15px;
    }

    button {
      background: #25D366;
      border: none;
      padding: 12px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    button:disabled {
      opacity: 0.6;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-top: 10px;
    }

    #qr {
      margin-top: 20px;
      width: 220px;
      height: 220px;
      background: white;
      padding: 10px;
      display: none;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      min-height: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>WhatsApp Bot Setup</h2>

    <button id="connectBtn" onclick="connect()">Connect WhatsApp</button>

    <img id="qr" />

    <div class="status" id="status">Click connect to start</div>

    <hr style="margin:20px 0; opacity:0.2">

    <h3 style="font-size:14px;">Test Bot</h3>

    <input id="phone" placeholder="91XXXXXXXXXX" />
    <input id="message" value="Hi" />

    <button onclick="sendTest()">Send Test Message</button>

    <div class="status" id="testStatus"></div>
  </div>

  <script>
    // ✅ FIXED PORT
    const BASE_URL = "http://localhost:3000";
    const USER_ID = "user1";

    let isPolling = false;

    async function connect() {
      const status = document.getElementById('status');
      const btn = document.getElementById('connectBtn');

      status.innerText = "🚀 Starting...";
      btn.disabled = true;

      try {
        const res = await fetch(`${BASE_URL}/api/whatsapp/connect`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: USER_ID })
        });

        if (!res.ok) throw new Error();

        setTimeout(() => {
          if (!isPolling) {
            isPolling = true;
            pollQR();
          }
        }, 3000);

      } catch {
        status.innerText = "❌ Backend not reachable";
        btn.disabled = false;
      }
    }

    async function pollQR() {
      const img = document.getElementById('qr');
      const status = document.getElementById('status');

      try {
        const res = await fetch(`${BASE_URL}/api/whatsapp/qr/${USER_ID}`);
        const data = await res.json();

        if (data.status === "qr") {
          img.src = data.qr;
          img.style.display = "block";
          status.innerText = "📲 Scan QR with WhatsApp";
          return;
        }

        if (data.status === "connected") {
          status.innerText = "✅ WhatsApp Connected!";
          img.style.display = "none";
          isPolling = false;
          return;
        }

        status.innerText = "⏳ Initializing...";

      } catch {
        status.innerText = "⚠️ Retry...";
      }

      setTimeout(pollQR, 3000);
    }

    async function sendTest() {
      const phone = document.getElementById('phone').value;
      const message = document.getElementById('message').value;
      const status = document.getElementById('testStatus');

      if (!phone || !message) {
        status.innerText = "❌ Enter phone & message";
        return;
      }

      status.innerText = "📤 Sending...";

      try {
        const res = await fetch(`${BASE_URL}/api/whatsapp/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: USER_ID,
            phone,
            text: message
          })
        });

        const data = await res.json();

        if (data.success) {
          status.innerText = "✅ Message sent!";
        } else {
          status.innerText = "❌ Failed to send";
        }

      } catch {
        status.innerText = "❌ Error sending message";
      }
    }
  </script>

</body>
</html>
